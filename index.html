<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Magic To-Do App</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="stars"></div>


<div class="container">


<h1>✨ Magic To-Do List ✨</h1>

<p class="subtitle">
Organize your tasks with a touch of magic
</p>


<div class="input-box">

<input 
type="text" 
id="taskInput"
placeholder="Enter your magical task..."
>


<button onclick="addTask()">
Add Task
</button>

</div>



<section>


<h2>
Pending Tasks 
<span id="pendingCount">0 pending</span>
</h2>


<ul id="pendingList"></ul>


<p id="pendingEmpty" class="empty">
No pending tasks ✨
</p>


</section>





<section>


<h2>
Completed Tasks
<span id="completedCount">0 completed</span>
</h2>


<ul id="completedList"></ul>


<p id="completedEmpty" class="empty">
No completed tasks yet 🌙
</p>


</section>



</div>


<script src="script.js"></script>


</body>

</html>
